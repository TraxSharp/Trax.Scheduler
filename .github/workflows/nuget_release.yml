name: Release NuGet Package

on:
  push:
    branches:
      - main

concurrency:
  group: release
  cancel-in-progress: false

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '20'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      issues: write
      pull-requests: write
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: trax
          POSTGRES_PASSWORD: trax123
          POSTGRES_DB: trax_scheduler_tests
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U trax"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: preview

      - name: Install dependencies
        run: npm install

      - name: Build
        run: dotnet build --configuration Release

      - name: Test
        run: dotnet test --configuration Release --no-build

      - name: Release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: npx semantic-release

      - name: Get release version
        id: version
        run: |
          if [ -f .release-version ]; then
            echo "version=$(cat .release-version)" >> $GITHUB_OUTPUT
            echo "released=true" >> $GITHUB_OUTPUT
          fi

      - name: Pack
        if: steps.version.outputs.released == 'true'
        run: dotnet pack --configuration Release --output nupkg -p:Version=${{ steps.version.outputs.version }}

      - name: Push to NuGet
        if: steps.version.outputs.released == 'true'
        run: dotnet nuget push "nupkg/*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
